<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Coachella 2026 - Contacto</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="galeria.html">Galería de Artistas</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <h1>Consultas y Suscripción</h1>

    <h3>Horarios de Atención</h3>
    <table border="1">
        <tr>
            <td>Lunes a Viernes</td>
            <td>09:00 - 18:00</td>
        </tr>
        <tr>
            <td>Sábados</td>
            <td>10:00 - 14:00</td>
        </tr>
    </table>

    <h3>Formulario de Contacto</h3>
    <form>
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required><br><br>
        
        <label>Correo Electrónico (Gmail):</label><br>
        <input type="email" name="email" required><br><br>
        
        <label>Mensaje:</label><br>
        <textarea name="mensaje" rows="4" cols="30"></textarea><br><br>
        
        <button type="submit">Enviar Mensaje</button>
    </form>

    <hr>

    <h3>Suscribirse al Boletín</h3>
    <p>Recibí las últimas novedades de Coachella 2026.</p>
    <form>
        <label>Email para suscripción:</label>
        <input type="email" placeholder="ejemplo@gmail.com" required>
        <input type="submit" value="Suscribirse">
    </form>

</body>
</html>
